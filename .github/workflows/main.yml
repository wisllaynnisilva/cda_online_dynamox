name: cda_online_dynamox

on:
  schedule:
    - cron: '0 7 * * *'  # Todo dia às 04:00 no Brasil (UTC-3)
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar script
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DYNAMOX_SERVICE_ACCOUNT: ${{ secrets.DYNAMOX_SERVICE_ACCOUNT }}
          DYNAMOX_TOKEN: ${{ secrets.DYNAMOX_TOKEN }}
          DYNAMOX_GERMANO: ${{ secrets.DYNAMOX_GERMANO }}
          DYNAMOX_UBU: ${{ secrets.DYNAMOX_UBU }}
        run: |
          python cda_online_dynamox.py
